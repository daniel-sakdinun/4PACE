        name: A01_G1
        S_rated: 100
        pf: 0.85
        a: 500
        b: 7
        c: 0.004
      - type: SynchronousMachine
        name: A01_G2
        S_rated: 100
        pf: 0.85
        a: 300
        b: 6.8
        c: 0.006
      - type: SynchronousMachine
        name: A01_G3
        S_rated: 100
        pf: 0.85
        a: 400
        b: 6.3
        c: 0.009

  - name: A02
    Vbase: 6.9
    bus_type: PV
    components:
      - type: SynchronousMachine
        name: A02_G1
        P: 80
        S_rated: 100
        pf: 0.85
        a: 500
        b: 6.4
        c: 0.008
      - type: SynchronousMachine
        name: A02_G2
        P: 80
        S_rated: 100
        pf: 0.85
