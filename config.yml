# --- Branch Definitions (Lines & Transformers) ---
branches:
  - type: Transformer
    name: TR1_A01_B01
    from_bus: A01
    to_bus: B01
    S_max: 400
    R: 0.002
    X: 0.04
    tap_ratio: 1.0

  - type: Transformer
    name: TR2_A02_B01
    from_bus: A02
    to_bus: B01
    S_max: 400
    R: 0.002
    X: 0.04
    tap_ratio: 1.0

  - type: TransmissionLine
    name: Line_A01_A02
    from_bus: A01
    to_bus: A02
    S_max: 300
    R: 0.01
    X: 0.05
    B_shunt: 0.01